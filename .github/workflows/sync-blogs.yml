name: Sync blog posts

on:
  workflow_dispatch:
  schedule:
    - cron: "20 0 * * *"

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate blog pages
        env:
          GH_TOKEN: ${{ secrets.HOMELAB_REPO_TOKEN || github.token }}
        run: python3 scripts/sync_blogs.py

      - name: Commit updates
        run: |
          if git diff --quiet; then
            echo "No blog changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add blog
          git commit -m "Sync published blog posts"
          git push
